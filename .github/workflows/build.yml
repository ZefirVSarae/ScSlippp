name: Build TapokAntivirus

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "TapokAntivirus_SetupV4" --icon "icon.ico" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TapokAntivirus-Build
        path: dist/TapokAntivirus_SetupV4.exe
        
